<!DOCTYPE html>
<html>
<head><title>Restore Kaden</title></head>
<body style="font-family:sans-serif;padding:40px;background:#fff5f5">
<h2>Restore Kaden's Progress</h2>
<p>After clicking the button below, go back to the main app and check Kaden's Word Adventure and Science Lab.</p>
<button id="btn" style="padding:16px 32px;font-size:18px;background:#e85d75;color:white;border:none;border-radius:12px;cursor:pointer">
  Restore Kaden's Progress
</button>
<pre id="log" style="margin-top:20px;background:#f0f0f0;padding:16px;border-radius:8px;display:none"></pre>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://qjjvbgtkkedzyrewbohg.supabase.co";
const SUPABASE_KEY = "sb_publishable_vvwesppVCeZQocmRTOvu1g_MYX-yFaf";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById("btn").onclick = async function() {
  var log = document.getElementById("log");
  log.style.display = "block";
  log.textContent = "Checking session...\n";

  var { data: { session } } = await sb.auth.getSession();
  if (!session || !session.user) {
    log.textContent += "ERROR: Not logged in. Please log in at kllearning.netlify.app first, then come back here.\n";
    return;
  }
  log.textContent += "Logged in as: " + session.user.email + "\n";

  var { data: prog, error } = await sb.from("progress").select("data").eq("id", session.user.id).single();
  if (error || !prog) {
    log.textContent += "ERROR: No progress data found. error=" + (error ? error.message : "null") + "\n";
    return;
  }

  var kids = prog.data.kids || [];
  var kadenIdx = kids.findIndex(function(k) { return k.name === "Kaden"; });
  if (kadenIdx === -1) {
    log.textContent += "ERROR: Kaden profile not found. Kids: " + kids.map(function(k){return k.name}).join(", ") + "\n";
    return;
  }

  var kaden = kids[kadenIdx];
  log.textContent += "Found Kaden at index " + kadenIdx + "\n";

  if (!kaden.english) kaden.english = {};
  kaden.english.challengeScores = {
    "enchanted-forest-vocab": {score: 7, total: 8, perfect: false},
    "enchanted-forest-spelling": {score: 8, total: 8, perfect: true},
    "enchanted-forest-grammar": {score: 6, total: 8, perfect: false},
    "crystal-cave-vocab": {score: 7, total: 8, perfect: false},
    "crystal-cave-spelling": {score: 7, total: 8, perfect: false},
    "crystal-cave-grammar": {score: 8, total: 8, perfect: true}
  };
  kaden.english.totalChallengesCompleted = 6;
  kaden.english.vocabCompleted = 2;
  kaden.english.spellingCompleted = 2;
  kaden.english.grammarCompleted = 2;
  kaden.english.perfectScores = 2;
  kaden.english.totalStars = 14;
  log.textContent += "English restored: 6 challenges, 14 stars, 2 perfect\n";

  if (!kaden.science) kaden.science = {};
  kaden.science.elementsLearned = ["H","He","C","N","O","Fe","Au","Ag","Cu","Ca"];
  if (!kaden.science.quizScores) kaden.science.quizScores = {};
  kaden.science.quizScores.intermediate = 8;
  if (!kaden.science.compoundsDiscovered) kaden.science.compoundsDiscovered = [];
  if (!kaden.science.recipesDiscovered) kaden.science.recipesDiscovered = [];
  log.textContent += "Science restored: 10 elements, quiz 2 score 8/10\n";

  if (!kaden.badgesEarned) kaden.badgesEarned = [];
  ["eng-vocab-hero","eng-spelling-bee","eng-grammar-guru","sci-first-element","sci-10-elements"].forEach(function(b) {
    if (!kaden.badgesEarned.includes(b)) kaden.badgesEarned.push(b);
  });
  log.textContent += "Badges restored: " + kaden.badgesEarned.length + " total\n";

  var payload = { kids: kids, activeKidIndex: prog.data.activeKidIndex || 0 };
  var { error: saveErr } = await sb.from("progress")
    .upsert({ id: session.user.id, data: payload, updated_at: new Date().toISOString() });

  if (saveErr) {
    log.textContent += "ERROR saving: " + saveErr.message + "\n";
  } else {
    log.textContent += "\nSUCCESS! Kaden's progress has been restored.\n";
    log.textContent += "Now go to kllearning.netlify.app and refresh the page.\n";
    document.getElementById("btn").textContent = "Done!";
    document.getElementById("btn").style.background = "#4CAF50";
  }
};
</script>
</body>
</html>
